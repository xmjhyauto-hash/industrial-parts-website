version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=production
      - NEXTAUTH_SECRET=your-production-secret-key
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=your-secure-password
    volumes:
      - db-data:/app/prisma
      - uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  db-data:
  uploads:
